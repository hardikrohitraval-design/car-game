<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚗 Car Dodger - Improved</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #gameContainer {
      text-align: center;
    }
    canvas {
      border: 5px solid #0f0;
      box-shadow: 0 0 30px #0f0;
      image-rendering: pixelated;
    }
    #ui {
      margin: 10px;
      font-size: 22px;
    }
    button {
      background: #0f0;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { background: #0a0; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <h1>🚗 CAR DODGER</h1>
    <div id="ui">
      <span id="score">Score: 0</span> | 
      <span id="highScore">High: 0</span>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <p id="instructions" style="color:#888; margin:10px;">← → or A D to move • P to pause</p>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");

    const WIDTH = 400;
    const HEIGHT = 600;

    let playerX = WIDTH / 2 - 25;
    let playerSpeedX = 0;
    const playerWidth = 50;
    const playerHeight = 80;

    let score = 0;
    let highScore = localStorage.getItem("carHighScore") || 0;
    highScoreEl.textContent = `High: ${highScore}`;

    let gameOver = false;
    let paused = false;
    let started = false;

    let obstacleSpeed = 5;
    let spawnRate = 0.03;
    let obstacles = [];
    let particles = [];

    let keys = {};
    let lastTime = 0;
    let engineSound = null;

    // Simple Web Audio API for sounds
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, duration, type = "sine", volume = 0.3) {
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = freq;
      gain.gain.value = volume;
      oscillator.connect(gain).connect(audioCtx.destination);
      oscillator.start();
      setTimeout(() => {
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
        oscillator.stop(audioCtx.currentTime + 0.1);
      }, duration);
    }

    function playCrash() {
      playSound(150, 300, "sawtooth", 0.6);
      setTimeout(() => playSound(80, 400, "sawtooth", 0.4), 100);
    }

    function playScoreBeep() {
      playSound(800, 50, "square", 0.2);
    }

    function createParticle(x, y) {
      return {
        x: x,
        y: y,
        vx: Math.random() * 8 - 4,
        vy: Math.random() * 8 - 6,
        life: 40,
        color: `hsl(${Math.random()*60}, 100%, 60%)`
      };
    }

    function drawRoad(time) {
      // Background road
      const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      grad.addColorStop(0, "#111");
      grad.addColorStop(1, "#333");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // Lane markings with perspective
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 6;
      const offset = (time / 8) % 120;
      for (let i = -2; i < 8; i++) {
        const y = i * 120 + offset;
        ctx.beginPath();
        ctx.moveTo(WIDTH * 0.25, y);
        ctx.lineTo(WIDTH * 0.25, y + 70);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(WIDTH * 0.75, y);
        ctx.lineTo(WIDTH * 0.75, y + 70);
        ctx.stroke();
      }
    }

    function drawCar(x, y, color, isPlayer = false) {
      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(x + 5, y + playerHeight + 5, playerWidth - 10, 12);

      // Main body
      ctx.fillStyle = color;
      ctx.fillRect(x, y, playerWidth, playerHeight);

      // Cabin
      ctx.fillStyle = "#111";
      ctx.fillRect(x + 10, y + 18, playerWidth - 20, 32);

      // Lights / details
      ctx.fillStyle = isPlayer ? "#0ff" : "#f00";
      ctx.fillRect(x + 8, y + 8, 10, 8);
      ctx.fillRect(x + playerWidth - 18, y + 8, 10, 8);

      // Wheels
      ctx.fillStyle = "#000";
      ctx.fillRect(x + 6, y + 15, 12, 18);
      ctx.fillRect(x + playerWidth - 18, y + 15, 12, 18);
      ctx.fillRect(x + 6, y + playerHeight - 30, 12, 18);
      ctx.fillRect(x + playerWidth - 18, y + playerHeight - 30, 12, 18);
    }

    function update(delta) {
      if (!started || gameOver || paused) return;

      // Player movement with inertia
      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) playerSpeedX -= 1.2;
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) playerSpeedX += 1.2;

      playerSpeedX *= 0.85; // friction
      playerX += playerSpeedX;

      // Boundaries
      if (playerX < 10) { playerX = 10; playerSpeedX = 0; }
      if (playerX > WIDTH - playerWidth - 10) { 
        playerX = WIDTH - playerWidth - 10; 
        playerSpeedX = 0; 
      }

      // Spawn obstacles
      if (Math.random() < spawnRate) {
        const obsX = Math.random() * (WIDTH - playerWidth - 20) + 10;
        obstacles.push({ x: obsX, y: -playerHeight - 20, width: playerWidth, height: playerHeight });
      }

      // Update obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += obstacleSpeed;

        if (obstacles[i].y > HEIGHT) {
          obstacles.splice(i, 1);
          score += 10;
          scoreEl.textContent = `Score: ${score}`;
          if (score % 50 === 0) playScoreBeep();

          // Increase difficulty
          if (score % 200 === 0) {
            obstacleSpeed += 0.8;
            spawnRate = Math.min(0.08, spawnRate + 0.005);
          }
        }
      }

      // Collision
      for (let obs of obstacles) {
        if (
          playerX < obs.x + obs.width &&
          playerX + playerWidth > obs.x &&
          HEIGHT - 130 < obs.y + obs.height &&
          HEIGHT - 130 + playerHeight > obs.y
        ) {
          gameOver = true;
          playCrash();

          // Explosion particles
          for (let k = 0; k < 30; k++) {
            particles.push(createParticle(playerX + playerWidth/2, HEIGHT - 130 + playerHeight/2));
          }

          if (score > highScore) {
            highScore = score;
            localStorage.setItem("carHighScore", highScore);
            highScoreEl.textContent = `High: ${highScore}`;
          }
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function draw() {
      const time = Date.now();

      drawRoad(time);

      // Draw obstacles
      for (let obs of obstacles) {
        drawCar(obs.x, obs.y, "#ff3333");
      }

      // Draw player
      drawCar(playerX, HEIGHT - 130, "#00ff88", true);

      // Draw particles
      for (let p of particles) {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 40;
        ctx.fillRect(p.x, p.y, 6, 6);
      }
      ctx.globalAlpha = 1;

      if (!started) {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "#0f0";
        ctx.font = "bold 36px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("PRESS SPACE", WIDTH/2, HEIGHT/2 - 40);
        ctx.font = "20px Courier New";
        ctx.fillText("to START", WIDTH/2, HEIGHT/2 + 10);
      }

      if (paused && started) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "#ff0";
        ctx.font = "bold 40px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("PAUSED", WIDTH/2, HEIGHT/2);
      }

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "#f00";
        ctx.font = "bold 45px Courier New";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", WIDTH/2, HEIGHT/2 - 60);

        ctx.fillStyle = "#fff";
        ctx.font = "28px Courier New";
        ctx.fillText(`Score: ${score}`, WIDTH/2, HEIGHT/2 - 10);

        ctx.font = "20px Courier New";
        ctx.fillText("Press R to Restart", WIDTH/2, HEIGHT/2 + 60);
      }
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const delta = timestamp - lastTime;

      update(delta);
      draw();

      lastTime = timestamp;
      requestAnimationFrame(gameLoop);
    }

    function resetGame() {
      playerX = WIDTH / 2 - 25;
      playerSpeedX = 0;
      obstacles = [];
      particles = [];
      score = 0;
      obstacleSpeed = 5;
      spawnRate = 0.03;
      gameOver = false;
      paused = false;
      scoreEl.textContent = "Score: 0";
    }

    // Controls
    window.addEventListener("keydown", e => {
      keys[e.key] = true;

      if (!started && e.key === " ") {
        started = true;
        document.getElementById("instructions").style.display = "none";
      }

      if (gameOver && e.key.toLowerCase() === "r") {
        resetGame();
      }

      if (started && e.key.toLowerCase() === "p") {
        paused = !paused;
      }
    });

    window.addEventListener("keyup", e => {
      keys[e.key] = false;
    });

    // Touch support for mobile
    let touchStartX = 0;
    canvas.addEventListener("touchstart", e => {
      if (!started) started = true;
      touchStartX = e.changedTouches[0].screenX;
    });

    canvas.addEventListener("touchmove", e => {
      if (gameOver || paused) return;
      const touchX = e.changedTouches[0].screenX;
      const diff = touchX - touchStartX;
      playerSpeedX += diff * 0.08;
      touchStartX = touchX;
    });

    // Start the game
    highScoreEl.textContent = `High: ${highScore}`;
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
